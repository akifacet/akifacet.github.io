<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyor...</title>

    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="refresh"
        content="0; url=https://drive.google.com/drive/folders/18HHK2RilgObJnbiGc42lvUjMJdSih5aL?usp=sharing">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            text-align: center;
        }

        .container {
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        a {
            color: var(--primary);
            text-decoration: none;
            margin-top: 1rem;
            display: block;
            font-size: 0.9rem;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Dosyaya Yönlendiriliyorsunuz...</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem;">Eğer yönlendirme otomatik başlamazsa aşağıdaki linke
            tıklayın.</p>

        <a href="https://drive.google.com/drive/folders/18HHK2RilgObJnbiGc42lvUjMJdSih5aL?usp=sharing"
            id="fallback-link">Buraya tıklayarak devam edin</a>
    </div>

    <script>
        const driveLink = "https://drive.google.com/drive/folders/18HHK2RilgObJnbiGc42lvUjMJdSih5aL?usp=sharing";
        if (driveLink) {
            window.location.replace(driveLink);
        }
    </script>
</body>

</html>
